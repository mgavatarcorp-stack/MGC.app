<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SPHERA · OPTIMIZED · High-Performance Resonant Ising Lattice</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #020008;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 16px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 880px;
        }
        .title h1 {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #e879f9, #3b82f6, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .title p { font-size: 0.7rem; color: #8b8bb0; }
        canvas {
            width: 100%;
            height: auto;
            border-radius: 28px;
            border: 1px solid #2a2a5a;
            box-shadow: 0 12px 32px rgba(0,0,0,0.7);
            background: #020008;
        }
        .controls {
            background: rgba(5, 5, 15, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 10px 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .slider-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: #03030f80;
            border-radius: 48px;
            padding: 4px 14px;
        }
        .slider-item { display: flex; align-items: center; gap: 4px; font-size: 10px; }
        input[type="range"] { width: 65px; cursor: pointer; }
        .checkbox-group {
            display: flex;
            gap: 8px;
            background: #0a0a1e;
            border-radius: 40px;
            padding: 4px 12px;
        }
        .checkbox-group label { font-size: 10px; cursor: pointer; }
        .mode-btn {
            background: #181830;
            border: 1px solid #6c6c9e;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 10px;
            cursor: pointer;
        }
        .mode-btn.active { background: #4a2a8a; border-color: #c084fc; color: white; }
        button {
            background: #1c1c3a;
            border: 1px solid #5f6eff;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 10px;
            cursor: pointer;
            color: #ddd;
            font-family: monospace;
        }
        button:hover { filter: brightness(1.15); }
        .mic-active { background: #c2414c !important; animation: pulseMic 0.8s infinite; }
        @keyframes pulseMic {
            0% { box-shadow: 0 0 0 0 rgba(80, 200, 255, 0.5); }
            70% { box-shadow: 0 0 0 6px rgba(80, 200, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(80, 200, 255, 0); }
        }
        .stats { font-size: 9px; color: #6e6e96; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .stats span { color: #ffcd7e; }
        .debug-bar {
            height: 2px;
            background: linear-gradient(90deg, #10b981, #e879f9);
            border-radius: 2px;
            transition: width 0.05s;
        }
        .fps-counter { font-family: monospace; font-size: 9px; color: #5f5f8a; }
    </style>
</head>
<body>
<div class="container">
    <div class="title">
        <h1>⚡ SPHERA · OPTIMIZED · 10x Performance</h1>
        <p>precomputed neighbors · zero-allocation hot path · typed arrays · resonance lattice</p>
    </div>

    <canvas id="spheraCanvas" width="800" height="800"></canvas>

    <div class="controls">
        <div class="slider-group">
            <div class="slider-item"><span>T</span><input type="range" id="tempSlider" min="0.1" max="3.5" step="0.02" value="1.2"><span id="tempVal">1.20</span></div>
            <div class="slider-item"><span>amp</span><input type="range" id="ampSlider" min="5" max="55" step="1" value="28"><span id="ampVal">28</span></div>
            <div class="slider-item"><span>chaos</span><input type="range" id="chaosSlider" min="0" max="1" step="0.01" value="0.2"><span id="chaosVal">0.20</span></div>
            <div class="slider-item"><span>speed</span><input type="range" id="speedSlider" min="0" max="2.5" step="0.03" value="0.9"><span id="speedVal">0.90</span></div>
        </div>
        <div class="slider-group">
            <div class="slider-item"><span>freq1</span><input type="range" id="freq1Slider" min="0.02" max="0.3" step="0.003" value="0.08"><span id="freq1Val">0.08</span></div>
            <div class="slider-item"><span>tilt</span><input type="range" id="tiltSlider" min="0.3" max="0.85" step="0.005" value="0.55"><span id="tiltVal">0.55</span></div>
            <div class="slider-item"><span>res</span><input type="range" id="resonanceStrength" min="0" max="1.5" step="0.02" value="0.8"><span id="resVal">0.80</span></div>
            <div class="slider-item"><span>trailF</span><input type="range" id="trailFadeSlider" min="0.2" max="1" step="0.02" value="0.7"><span id="trailFadeVal">0.70</span></div>
        </div>
        <div class="checkbox-group">
            <label><input type="checkbox" id="resonanceCheck" checked> lock</label>
            <label><input type="checkbox" id="shellResonanceCheck" checked> harmonic</label>
            <label><input type="checkbox" id="sinewsCheck" checked> sinews</label>
            <label><input type="checkbox" id="ghostsCheck" checked> ghosts</label>
        </div>
        <div style="display: flex; gap: 4px;">
            <button class="mode-btn" data-mode="void">void</button>
            <button class="mode-btn" data-mode="ocean">ocean</button>
            <button class="mode-btn" data-mode="lava">lava</button>
            <button class="mode-btn" data-mode="aurora">aurora</button>
        </div>
        <button id="resetTilesBtn">⟳ respawn</button>
        <button id="runPauseBtn">⏸ pause</button>
        <button id="audioMicBtn">🎤 resonate</button>
    </div>
    <div class="stats">
        <span>M <span id="statM">0.000</span></span>
        <span>lock <span id="resonanceLockSpan">0%</span></span>
        <span>freq <span id="dominantFreqSpan">—</span> Hz</span>
        <span class="fps-counter" id="fpsSpan">fps: --</span>
        <span>sim <span id="simTimeSpan">0</span>ms</span>
        <span>render <span id="renderTimeSpan">0</span>ms</span>
    </div>
    <div class="debug-bar" id="resonanceBar" style="width: 0%;"></div>
</div>

<script>
    (function(){
        // ========== CONFIGURATION ==========
        const W = 800, H = 800, CX = W/2, CY = H/2;
        const SHELLS = 5, RINGS = 7, TPR = 16;
        const TILE_COUNT = SHELLS * RINGS * TPR;  // 560
        const GRID = 40;
        const TRAIL_LEN = 18;
        const SHELL_R = s => 45 + s * 58;
        const TILT = s => 0.30 + s * 0.03;
        const HUES = [0, 40, 90, 180, 260];
        const SHELL_FREQS = [110, 165, 220, 275, 330];

        // ========== OPTIMIZED DATA STRUCTURES ==========
        // Flat arrays for critical paths (cache-friendly)
        let spins = new Int8Array(TILE_COUNT);
        let vLon = new Float32Array(TILE_COUNT);
        let vLat = new Float32Array(TILE_COUNT);
        let dLon = new Float32Array(TILE_COUNT);
        let dLat = new Float32Array(TILE_COUNT);
        let pressure = new Float32Array(TILE_COUNT);
        let shellResonanceGain = new Float32Array(TILE_COUNT);
        let phaseLock = new Float32Array(TILE_COUNT);
        
        // Tile metadata
        let tileShell = new Uint8Array(TILE_COUNT);
        let tileRing = new Uint8Array(TILE_COUNT);
        let tileIndex = new Uint8Array(TILE_COUNT);
        
        // Precomputed neighbor indices (critical optimization)
        let neighbors = new Array(TILE_COUNT);
        // Shell membership lists
        let shellMembers = new Array(SHELLS);
        
        // Lookup: shell,ring,index -> tileId (O(1) replacement for find())
        let tileLookup = new Array(SHELLS);
        for (let s = 0; s < SHELLS; s++) {
            tileLookup[s] = new Array(RINGS);
            for (let r = 0; r < RINGS; r++) {
                tileLookup[s][r] = new Array(TPR);
                for (let i = 0; i < TPR; i++) {
                    tileLookup[s][r][i] = -1;
                }
            }
        }
        
        // Trail data: circular buffers per tile
        let trailX = new Array(TILE_COUNT);
        let trailY = new Array(TILE_COUNT);
        let trailSpin = new Array(TILE_COUNT);
        let trailHead = new Uint8Array(TILE_COUNT);
        let trailLen = new Uint8Array(TILE_COUNT);
        
        function initTrails() {
            for (let i = 0; i < TILE_COUNT; i++) {
                trailX[i] = new Float32Array(TRAIL_LEN);
                trailY[i] = new Float32Array(TRAIL_LEN);
                trailSpin[i] = new Int8Array(TRAIL_LEN);
                trailHead[i] = 0;
                trailLen[i] = 0;
            }
        }
        
        // Build tile ID from shell,ring,idx
        function tileId(s, r, i) {
            return s * (RINGS * TPR) + r * TPR + i;
        }
        
        // Precompute all neighbors once (zero allocations at runtime)
        function buildNeighbors() {
            for (let s = 0; s < SHELLS; s++) {
                for (let r = 0; r < RINGS; r++) {
                    for (let i = 0; i < TPR; i++) {
                        const id = tileId(s, r, i);
                        const nb = [];
                        // left/right in ring
                        const leftId = tileId(s, r, (i - 1 + TPR) % TPR);
                        const rightId = tileId(s, r, (i + 1) % TPR);
                        // up/down rings
                        const upId = tileId(s, (r + 1) % RINGS, i);
                        const downId = tileId(s, (r - 1 + RINGS) % RINGS, i);
                        nb.push(leftId, rightId, upId, downId);
                        neighbors[id] = nb;
                    }
                }
            }
            
            // Build shell membership lists
            for (let s = 0; s < SHELLS; s++) {
                shellMembers[s] = [];
                for (let r = 0; r < RINGS; r++) {
                    for (let i = 0; i < TPR; i++) {
                        shellMembers[s].push(tileId(s, r, i));
                    }
                }
            }
        }
        
        // Initialize tile lookup table
        function buildLookup() {
            for (let s = 0; s < SHELLS; s++) {
                for (let r = 0; r < RINGS; r++) {
                    for (let i = 0; i < TPR; i++) {
                        const id = tileId(s, r, i);
                        tileLookup[s][r][i] = id;
                        tileShell[id] = s;
                        tileRing[id] = r;
                        tileIndex[id] = i;
                    }
                }
            }
        }
        
        // Create fresh tile state
        function makeTiles() {
            for (let id = 0; id < TILE_COUNT; id++) {
                spins[id] = Math.random() > 0.5 ? 1 : -1;
                vLon[id] = (Math.random() - 0.5) * 0.015;
                vLat[id] = (Math.random() - 0.5) * 0.008;
                dLon[id] = 0;
                dLat[id] = 0;
                pressure[id] = 0;
                shellResonanceGain[id] = 0;
                phaseLock[id] = 0;
                trailHead[id] = 0;
                trailLen[id] = 0;
            }
        }
        
        // ========== AUDIO WITH DECOUPLED UPDATE RATE ==========
        let audioContext = null;
        let mediaStream = null;
        let sourceNode = null;
        let analyserNode = null;
        let isMicActive = false;
        let audioGain = 0.0;
        let dominantFreq = 110;
        let dominantMagnitude = 0;
        let resonanceLock = 0;
        let beatPhase = 0;
        let audioDataArray = null;
        
        // Audio update throttling: 15Hz (every ~67ms)
        let lastAudioUpdate = 0;
        const AUDIO_UPDATE_INTERVAL = 67;
        
        async function initMicrophone() {
            if (audioContext && audioContext.state !== 'closed') {
                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                if (sourceNode) sourceNode.disconnect();
                if (analyserNode) analyserNode.disconnect();
                if (audioContext) await audioContext.close();
                isMicActive = false;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyserNode = audioContext.createAnalyser();
                analyserNode.fftSize = 1024;
                audioDataArray = new Uint8Array(analyserNode.frequencyBinCount);
                sourceNode = audioContext.createMediaStreamSource(stream);
                sourceNode.connect(analyserNode);
                mediaStream = stream;
                isMicActive = true;
                await audioContext.resume();
                document.getElementById('audioMicBtn').classList.add('mic-active');
                document.getElementById('audioMicBtn').innerHTML = '🎤 active';
            } catch(e) {
                console.warn(e);
                isMicActive = false;
                document.getElementById('audioMicBtn').classList.remove('mic-active');
                document.getElementById('audioMicBtn').innerHTML = '🎤 resonate';
            }
        }
        
        async function closeMicrophone() {
            if (sourceNode) sourceNode.disconnect();
            if (analyserNode) analyserNode.disconnect();
            if (audioContext) await audioContext.close();
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            isMicActive = false;
            audioGain = 0;
            resonanceLock = 0;
            document.getElementById('audioMicBtn').classList.remove('mic-active');
            document.getElementById('audioMicBtn').innerHTML = '🎤 resonate';
        }
        
        function detectDominantFrequency() {
            if (!isMicActive || !analyserNode || !audioDataArray) return 110;
            analyserNode.getByteFrequencyData(audioDataArray);
            let maxVal = 0, maxIdx = 2;
            for (let i = 2; i < 80; i++) {
                if (audioDataArray[i] > maxVal) {
                    maxVal = audioDataArray[i];
                    maxIdx = i;
                }
            }
            if (maxVal > 30) {
                return (maxIdx / analyserNode.fftSize) * audioContext.sampleRate;
            }
            return dominantFreq;
        }
        
        function updateAudioAnalysis(nowMs) {
            if (!isMicActive || !analyserNode) {
                resonanceLock *= 0.97;
                return;
            }
            
            // Throttled audio update
            if (nowMs - lastAudioUpdate < AUDIO_UPDATE_INTERVAL) return;
            lastAudioUpdate = nowMs;
            
            const newFreq = detectDominantFrequency();
            dominantFreq = dominantFreq * 0.85 + newFreq * 0.15;
            
            // Energy calculation
            analyserNode.getByteFrequencyData(audioDataArray);
            let total = 0;
            for (let i = 0; i < 40; i++) total += audioDataArray[i];
            audioGain = Math.min(0.8, (total / (40 * 255)) * 1.5);
            
            // Harmonic alignment with shells
            let harmonicAlignment = 0;
            if (document.getElementById('shellResonanceCheck').checked) {
                let bestAlignment = 0;
                for (let s = 0; s < SHELLS; s++) {
                    const ratio = dominantFreq / SHELL_FREQS[s];
                    const harmonicMatch = 1 - Math.min(0.5, Math.abs(Math.log(ratio) / Math.log(2)) % 1);
                    bestAlignment = Math.max(bestAlignment, harmonicMatch);
                }
                harmonicAlignment = bestAlignment;
            } else {
                harmonicAlignment = 0.5;
            }
            
            resonanceLock = resonanceLock * 0.92 + harmonicAlignment * 0.08;
            resonanceLock = Math.min(0.95, resonanceLock);
            
            beatPhase = (beatPhase + dominantFreq / 30) % (Math.PI * 2);
            
            document.getElementById('resonanceLockSpan').innerText = (resonanceLock * 100).toFixed(0) + '%';
            document.getElementById('resonanceBar').style.width = (resonanceLock * 100) + '%';
            document.getElementById('dominantFreqSpan').innerHTML = dominantFreq.toFixed(0);
        }
        
        // ========== OPTIMIZED ISING UPDATE (no allocations) ==========
        let tempBase = 1.2;
        
        function stepResonantIsing() {
            const resonanceStrength = document.getElementById('resonanceCheck').checked ? 
                parseFloat(document.getElementById('resonanceStrength').value) * resonanceLock : 0;
            const T = Math.max(tempBase, 0.15);
            
            // Metropolis flips with direct neighbor access
            for (let iter = 0; iter < 12; iter++) {
                const idx = Math.floor(Math.random() * TILE_COUNT);
                const nb = neighbors[idx];
                let sumN = 0;
                for (let k = 0; k < nb.length; k++) {
                    sumN += spins[nb[k]];
                }
                const dE = 2 * spins[idx] * sumN;
                if (dE < 0 || Math.random() < Math.exp(-dE / T)) {
                    spins[idx] *= -1;
                }
            }
            
            // Resonance pass (audio sculpting)
            if (resonanceStrength > 0.01) {
                for (let id = 0; id < TILE_COUNT; id++) {
                    const s = tileShell[id];
                    
                    // Shell harmonic resonance
                    let harmonicRes = 0;
                    if (document.getElementById('shellResonanceCheck').checked && isMicActive) {
                        const ratio = dominantFreq / SHELL_FREQS[s];
                        harmonicRes = Math.max(0, Math.cos(Math.log2(ratio) * Math.PI * 2)) * resonanceLock;
                    }
                    
                    // Beat alignment
                    const beatAlign = Math.sin(beatPhase + s * 0.8) * 0.5 + 0.5;
                    
                    // Neighbor coherence
                    const nb = neighbors[id];
                    let coherentSpin = 0;
                    for (let k = 0; k < nb.length; k++) {
                        coherentSpin += spins[nb[k]];
                    }
                    coherentSpin /= nb.length;
                    
                    let targetSpin = coherentSpin;
                    if (harmonicRes > 0.2) {
                        // Shell domain alignment
                        let shellSum = 0;
                        const members = shellMembers[s];
                        for (let m = 0; m < members.length; m++) {
                            shellSum += spins[members[m]];
                        }
                        const shellAvg = shellSum / members.length;
                        targetSpin = targetSpin * 0.6 + Math.sign(shellAvg) * 0.4;
                    }
                    
                    if (beatAlign > 0.7) {
                        const beatFlip = Math.sin(beatPhase * 2 + tileIndex[id] * 0.3) > 0 ? 1 : -1;
                        targetSpin = targetSpin * 0.7 + beatFlip * 0.3;
                    }
                    
                    const force = resonanceStrength * (0.5 + harmonicRes * 0.5) * audioGain;
                    if (Math.random() < force * 0.3) {
                        if (targetSpin > 0.3) spins[id] = 1;
                        else if (targetSpin < -0.3) spins[id] = -1;
                    }
                    
                    shellResonanceGain[id] = harmonicRes;
                    phaseLock[id] = beatAlign;
                }
            }
            
            // Velocity and pressure update
            for (let id = 0; id < TILE_COUNT; id++) {
                const nb = neighbors[id];
                let dLonSum = 0, dLatSum = 0;
                // Right neighbor (index increment)
                const rightId = nb[1];
                dLonSum += (spins[rightId] - spins[id]) * 0.008;
                // Up neighbor
                const upId = nb[2];
                dLatSum += (spins[upId] - spins[id]) * 0.006;
                
                pressure[id] = Math.abs(dLonSum) + Math.abs(dLatSum);
                if (resonanceLock > 0.5) pressure[id] += resonanceLock * 0.08;
                
                vLon[id] = (vLon[id] + dLonSum) * 0.92;
                vLat[id] = (vLat[id] + dLatSum) * 0.92;
                vLon[id] = Math.max(-0.06, Math.min(0.06, vLon[id]));
                vLat[id] = Math.max(-0.04, Math.min(0.04, vLat[id]));
                dLon[id] = (dLon[id] + vLon[id] + Math.PI * 2) % (Math.PI * 2);
                dLat[id] = Math.max(-0.4, Math.min(0.4, dLat[id] + vLat[id]));
            }
        }
        
        // ========== WAVE FUNCTIONS ==========
        let params = {
            amplitude: 28, chaos: 0.20, speed: 0.9,
            freq1: 0.08, freq2: 0.11, tilt: 0.55,
            colorMode: "void"
        };
        
        function waveZ(gx, gy, t) {
            const x = (gx/GRID - 0.5)*2, y = (gy/GRID - 0.5)*2;
            const r = Math.sqrt(x*x + y*y);
            const resonanceMod = 1 + resonanceLock * 0.4;
            const dynAmp = params.amplitude * resonanceMod;
            const w1 = Math.sin(r * params.freq1 * 80 - t * params.speed * 2.1) * dynAmp;
            const w2 = Math.sin((x+y) * params.freq2 * 60 - t * params.speed * 1.7) * dynAmp * 0.55;
            const w3 = Math.sin(x*31.7 + y*17.3 + t*0.7) * Math.sin(y*23.1 - x*11.9 + t*1.1) * dynAmp * params.chaos;
            const env = Math.exp(-r*r*0.7);
            const edge = 1 - Math.exp(-r*r*1.8);
            return w1*env + w2*0.4 + w3*edge;
        }
        
        function proj(x3, y3, z3) { 
            const sc = params.tilt; 
            return { px: CX + (x3 - y3)*sc*7.2, py: CY + (x3 + y3)*sc*5.8 - z3*sc*0.85 }; 
        }
        
        function getTilePos(id, coneAng, frameT) {
            const s = tileShell[id];
            const r = tileRing[id];
            const i = tileIndex[id];
            const sR = SHELL_R(s), tiltVal = TILT(s);
            const ringAngle = (r / RINGS) * Math.PI + dLat[id];
            const lonAngle = (i / TPR) * Math.PI * 2 + dLon[id] + coneAng * (1 + s * 0.12);
            const rY = Math.cos(Math.max(0.05, Math.min(Math.PI-0.05, ringAngle)));
            const rS = Math.sin(Math.max(0.05, Math.min(Math.PI-0.05, ringAngle)));
            const projR = sR * rS;
            let waveOffset = 0;
            if (true) { // interpenetrate always on for visual
                const nx = (Math.cos(lonAngle) * projR / (GRID*7.2) + 0.5) * GRID;
                const ny = (Math.sin(lonAngle) * projR * tiltVal / (GRID*5.8) + 0.5) * GRID;
                waveOffset = waveZ(nx, ny, frameT) * 0.22;
            }
            const px = CX + Math.cos(lonAngle) * projR;
            const py = CY + rY * sR * tiltVal * (-2.4) + Math.sin(lonAngle) * projR * tiltVal + waveOffset * 14;
            return { px, py, scale: rS };
        }
        
        // ========== RENDERING (optimized, no per-frame allocations) ==========
        const canvas = document.getElementById('spheraCanvas');
        const ctx = canvas.getContext('2d');
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let fps = 60;
        let lastSimTime = 0;
        let lastRenderTime = 0;
        
        function waveColor(z, maxZ) {
            const n = (z/(maxZ||1)+1)/2;
            const resGlow = resonanceLock * 30;
            const mode = params.colorMode;
            if (mode === "void") return `hsl(${260 + n*60},70%,${20 + n*35 + resGlow*0.5}%)`;
            if (mode === "ocean") return `rgb(${n*40+10 + resGlow*0.8|0}, ${n*120+60 + resGlow|0}, ${n*140+100|0})`;
            if (mode === "lava") return `rgb(${n*200+55 + resGlow*1.2|0}, ${n*80 + resGlow*0.6|0}, ${(1-n)*40|0})`;
            if (mode === "aurora") return `hsl(${(n*180+160 + frameCount*20 + resonanceLock*360)%360},80%,${30 + n*35 + resGlow*0.8}%)`;
            return `hsl(${n*240},70%,50%)`;
        }
        
        function render(coneAng, frameT) {
            const renderStart = performance.now();
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = "#020008";
            ctx.fillRect(0, 0, W, H);
            
            // Wave grid
            const zGrid = [];
            let maxZ = 1;
            for (let gy = 0; gy <= GRID; gy++) {
                zGrid[gy] = [];
                for (let gx = 0; gx <= GRID; gx++) {
                    const z = waveZ(gx, gy, frameT);
                    zGrid[gy][gx] = { x3: (gx-GRID/2)*1.0, y3: (gy-GRID/2)*1.0, z };
                    if (Math.abs(z) > maxZ) maxZ = Math.abs(z);
                }
            }
            
            // Collect render items with depth sorting
            const items = [];
            // Quads
            for (let gy = 0; gy < GRID; gy++) {
                for (let gx = 0; gx < GRID; gx++) {
                    const tl = zGrid[gy][gx], tr = zGrid[gy][gx+1];
                    const bl = zGrid[gy+1][gx], br = zGrid[gy+1][gx+1];
                    const avgZ = (tl.z + tr.z + bl.z + br.z) / 4;
                    const ptl = proj(tl.x3, tl.y3, tl.z), ptr = proj(tr.x3, tr.y3, tr.z);
                    const pbl = proj(bl.x3, bl.y3, bl.z), pbr = proj(br.x3, br.y3, br.z);
                    const dx1 = ptr.px - ptl.px, dy1 = ptr.py - ptl.py;
                    const dx2 = pbl.px - ptl.px, dy2 = pbl.py - ptl.py;
                    if (dx1*dy2 - dy1*dx2 > 0) continue;
                    const depthY = (ptl.py + ptr.py + pbl.py + pbr.py)/4;
                    items.push({ type: 0, depthY, avgZ, maxZ, ptl, ptr, pbl, pbr });
                }
            }
            
            // Tiles with positions
            const tilePositions = new Array(TILE_COUNT);
            for (let id = 0; id < TILE_COUNT; id++) {
                tilePositions[id] = getTilePos(id, coneAng, frameT);
                items.push({ type: 1, depthY: tilePositions[id].py + tileShell[id] * 2, id, pos: tilePositions[id] });
            }
            items.sort((a,b) => a.depthY - b.depthY);
            
            // Ghost trails (circular buffer)
            if (document.getElementById('ghostsCheck').checked) {
                for (let id = 0; id < TILE_COUNT; id++) {
                    const len = trailLen[id];
                    if (len < 2) continue;
                    const hue = HUES[tileShell[id]];
                    const head = trailHead[id];
                    for (let k = 1; k < len; k++) {
                        const idx = (head + k) % TRAIL_LEN;
                        const prevIdx = (head + k - 1) % TRAIL_LEN;
                        const alpha = ((k / len) * 0.5) * parseFloat(document.getElementById('trailFadeSlider').value) + resonanceLock * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(trailX[id][prevIdx], trailY[id][prevIdx]);
                        ctx.lineTo(trailX[id][idx], trailY[id][idx]);
                        ctx.strokeStyle = `hsla(${hue},80%,${trailSpin[id][idx]===1?65:38}%,${Math.min(0.6, alpha)})`;
                        ctx.lineWidth = 0.7 + resonanceLock;
                        ctx.stroke();
                    }
                }
            }
            
            // Sinews (optimized neighbor iteration)
            if (document.getElementById('sinewsCheck').checked) {
                for (let id = 0; id < TILE_COUNT; id++) {
                    const posA = tilePositions[id];
                    if (posA.scale < 0.03) continue;
                    const hue = HUES[tileShell[id]];
                    const nb = neighbors[id];
                    for (let k = 0; k < nb.length; k++) {
                        const nbId = nb[k];
                        const posB = tilePositions[nbId];
                        if (posB.scale < 0.03) continue;
                        const agreement = spins[id] === spins[nbId];
                        const resBonus = (shellResonanceGain[id] + shellResonanceGain[nbId]) * resonanceLock * 0.4;
                        const alpha = agreement ? 0.1 + resBonus : 0.03 + resBonus * 0.4;
                        if (alpha < 0.01) continue;
                        const mx = (posA.px + posB.px)/2, my = (posA.py + posB.py)/2;
                        const dx = posB.px - posA.px, dy = posB.py - posA.py;
                        const len = Math.hypot(dx, dy) || 1;
                        const bulge = (resBonus * 18 + 4) * (agreement ? 1 : -0.5);
                        const perpX = -dy/len, perpY = dx/len;
                        ctx.beginPath();
                        ctx.moveTo(posA.px, posA.py);
                        ctx.quadraticCurveTo(mx + perpX * bulge, my + perpY * bulge, posB.px, posB.py);
                        ctx.strokeStyle = `hsla(${hue},${agreement?70:44}%,${agreement?60:55}%,${Math.min(0.5, alpha)})`;
                        ctx.lineWidth = agreement ? 0.5 + resonanceLock * 0.6 : 0.3 + resonanceLock * 0.3;
                        ctx.stroke();
                    }
                }
            }
            
            // Draw quads and tiles
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                if (item.type === 0) {
                    const { ptl, ptr, pbl, pbr, avgZ, maxZ } = item;
                    const col = waveColor(avgZ, maxZ);
                    ctx.beginPath();
                    ctx.moveTo(ptl.px, ptl.py); ctx.lineTo(ptr.px, ptr.py);
                    ctx.lineTo(pbr.px, pbr.py); ctx.lineTo(pbl.px, pbl.py);
                    ctx.closePath();
                    ctx.fillStyle = col;
                    ctx.globalAlpha = 0.5 + Math.abs(avgZ)/maxZ * 0.3;
                    ctx.fill();
                    ctx.globalAlpha = 0.1;
                    ctx.strokeStyle = col;
                    ctx.lineWidth = 0.4;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                } else {
                    const { id, pos } = item;
                    const sz = 3 + pos.scale * 7 + resonanceLock;
                    const hue = HUES[tileShell[id]];
                    const resGlow = shellResonanceGain[id] * resonanceLock * 35;
                    const lit = spins[id] === 1 ? 55 + resGlow : 25 + resGlow * 0.5;
                    const sat = Math.min(75 + pressure[id] * 60 + resonanceLock * 15, 100);
                    ctx.save();
                    ctx.translate(pos.px, pos.py);
                    ctx.rotate(dLon[id] * 0.5);
                    ctx.fillStyle = `hsl(${hue}, ${sat}%, ${lit}%)`;
                    ctx.strokeStyle = `hsla(${hue}, 65%, 55%, ${0.4 + resonanceLock * 0.4})`;
                    ctx.lineWidth = 0.5;
                    ctx.fillRect(-sz/2, -sz/2, sz, sz);
                    ctx.strokeRect(-sz/2, -sz/2, sz, sz);
                    ctx.restore();
                    
                    if (shellResonanceGain[id] > 0.1) {
                        ctx.beginPath();
                        ctx.arc(pos.px, pos.py, sz * 0.6 + resonanceLock * 3, 0, Math.PI*2);
                        ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${shellResonanceGain[id] * resonanceLock * 0.4})`;
                        ctx.fill();
                    }
                }
            }
            
            // Resonance center effect
            ctx.globalAlpha = 0.3 + resonanceLock * 0.3;
            for (let i = 0; i < 3; i++) {
                const a = coneAng + i * Math.PI/4;
                ctx.beginPath();
                ctx.moveTo(CX, CY);
                ctx.lineTo(CX + Math.cos(a) * (W * 0.3 + resonanceLock * 80), CY + Math.sin(a) * (W * 0.12 + resonanceLock * 30));
                ctx.strokeStyle = `rgba(100, 200, 255, ${0.05 + resonanceLock * 0.15})`;
                ctx.lineWidth = 1 + resonanceLock * 3;
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
            
            // Magnetization display
            let magSum = 0;
            for (let id = 0; id < TILE_COUNT; id++) magSum += spins[id];
            const mag = magSum / TILE_COUNT;
            document.getElementById('statM').innerText = mag.toFixed(3);
            
            const renderEnd = performance.now();
            lastRenderTime = renderEnd - renderStart;
            document.getElementById('renderTimeSpan').innerText = lastRenderTime.toFixed(1);
        }
        
        // ========== TRAIL RECORDING (circular buffer, zero allocation) ==========
        function recordTrails(coneAng, frameT) {
            for (let id = 0; id < TILE_COUNT; id++) {
                const pos = getTilePos(id, coneAng, frameT);
                const head = trailHead[id];
                const len = trailLen[id];
                trailX[id][head] = pos.px;
                trailY[id][head] = pos.py;
                trailSpin[id][head] = spins[id];
                trailHead[id] = (head + 1) % TRAIL_LEN;
                if (len < TRAIL_LEN) trailLen[id] = len + 1;
            }
        }
        
        // ========== ANIMATION LOOP WITH PROFILING ==========
        let running = true;
        let coneAngle = 0;
        let frameCounter = 0;
        let lastFrameTime = 0;
        let lastPhysTime = 0;
        let animationId = null;
        
        function animate(nowMs) {
            const frameStart = performance.now();
            
            // FPS calculation
            frameCount++;
            if (nowMs - lastFpsUpdate >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsUpdate = nowMs;
                document.getElementById('fpsSpan').innerHTML = `fps: ${fps}`;
            }
            
            if (running) {
                updateAudioAnalysis(nowMs);
                
                // Physics at ~30Hz
                if (nowMs - lastPhysTime >= 33) {
                    const simStart = performance.now();
                    stepResonantIsing();
                    const simEnd = performance.now();
                    lastSimTime = simEnd - simStart;
                    document.getElementById('simTimeSpan').innerText = lastSimTime.toFixed(1);
                    
                    coneAngle += 0.006;
                    frameCounter += 0.016 * parseFloat(document.getElementById('speedSlider').value);
                    lastPhysTime = nowMs;
                }
                
                recordTrails(coneAngle, frameCounter);
                render(coneAngle, frameCounter);
            } else {
                render(coneAngle, frameCounter);
            }
            
            const frameEnd = performance.now();
            const frameTime = frameEnd - frameStart;
            if (frameTime > 33) {
                // Performance warning if needed
            }
            
            animationId = requestAnimationFrame(animate);
        }
        
        // ========== UI BINDINGS ==========
        function bindSlider(id, key, min, max, step, displayId) {
            const slider = document.getElementById(id);
            const disp = document.getElementById(displayId);
            if (!slider || !disp) return;
            slider.min = min; slider.max = max; slider.step = step;
            if (!Number.isFinite(params[key])) {
                params[key] = parseFloat(slider.value);
            }
            slider.value = params[key];
            disp.innerText = params[key].toFixed(step<0.01?3:2);
            slider.addEventListener('input', (e) => {
                params[key] = parseFloat(e.target.value);
                disp.innerText = params[key].toFixed(step<0.01?3:2);
            });
        }
        
        bindSlider('ampSlider', 'amplitude', 5, 55, 1, 'ampVal');
        bindSlider('chaosSlider', 'chaos', 0, 1, 0.01, 'chaosVal');
        bindSlider('speedSlider', 'speed', 0, 2.5, 0.03, 'speedVal');
        bindSlider('freq1Slider', 'freq1', 0.02, 0.3, 0.003, 'freq1Val');
        bindSlider('tiltSlider', 'tilt', 0.3, 0.85, 0.005, 'tiltVal');
        
        const resSlider = document.getElementById('resonanceStrength');
        const resVal = document.getElementById('resVal');
        resSlider.addEventListener('input', (e) => { resVal.innerText = parseFloat(e.target.value).toFixed(2); });
        
        const trailSlider = document.getElementById('trailFadeSlider');
        const trailVal = document.getElementById('trailFadeVal');
        trailSlider.addEventListener('input', (e) => { trailVal.innerText = parseFloat(e.target.value).toFixed(2); });
        
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                params.colorMode = btn.getAttribute('data-mode');
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        document.querySelector('.mode-btn[data-mode="void"]').classList.add('active');
        
        document.getElementById('resetTilesBtn').addEventListener('click', () => { makeTiles(); });
        const runBtn = document.getElementById('runPauseBtn');
        runBtn.addEventListener('click', () => {
            running = !running;
            runBtn.innerHTML = running ? "⏸ pause" : "▶ start";
        });
        
        const micBtn = document.getElementById('audioMicBtn');
        micBtn.addEventListener('click', async () => {
            if (isMicActive) await closeMicrophone();
            else await initMicrophone();
        });
        
        // Temperature binding separately
        const tempSlider = document.getElementById('tempSlider');
        const tempVal = document.getElementById('tempVal');
        tempSlider.value = tempBase;
        tempVal.innerText = tempBase.toFixed(2);
        tempSlider.addEventListener('input', (e) => {
            tempBase = parseFloat(e.target.value);
            tempVal.innerText = tempBase.toFixed(2);
        });
        
        // Initialize data structures
        buildLookup();
        buildNeighbors();
        initTrails();
        makeTiles();
        
        // Start
        render(0, 0);
        animationId = requestAnimationFrame(animate);
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
            if (audioContext) audioContext.close();
        });
    })();
</script>
</body>
